<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sprout 🌱 — Welcome Back</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Bubblegum+Sans&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #fdf6f0;
      --card:    #fffcfe;
      --ink:     #3d3530;
      --muted:   #a89f9a;
      --subtle:  #e8e0db;
      --border:  #ede5e0;
      --s-pri:   #6dc49a;
      --s-dark:  #3a7a5c;
      --s-light: #e6f7ef;
      --c-pri:   #f4a4b8;
      --c-dark:  #be4e6a;
      --c-light: #fdeef4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Animated background blobs ── */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.45;
      animation: blobFloat ease-in-out infinite alternate;
      pointer-events: none;
    }
    .blob-1 { width: 420px; height: 420px; background: #ffd6ec; top: -100px; left: -120px; animation-duration: 8s; }
    .blob-2 { width: 340px; height: 340px; background: #d6f0e8; bottom: -80px; right: -80px; animation-duration: 10s; }
    .blob-3 { width: 260px; height: 260px; background: #e8d6f8; top: 40%; left: 60%; animation-duration: 7s; animation-delay: 2s; }
    @keyframes blobFloat {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(20px, -20px) scale(1.06); }
    }

    /* ── Floating petals ── */
    .petal {
      position: absolute; pointer-events: none;
      font-size: 18px; opacity: 0.18;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
      8%   { opacity: 0.18; }
      92%  { opacity: 0.18; }
      100% { transform: translateY(-10vh) rotate(400deg); opacity: 0; }
    }

    /* ── Card ── */
    .card {
      position: relative; z-index: 10;
      background: rgba(255, 252, 254, 0.88);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 28px;
      padding: 40px 40px 36px;
      width: 420px;
      box-shadow:
        0 8px 40px rgba(61,53,48,0.10),
        0 2px 8px rgba(61,53,48,0.05),
        inset 0 1px 0 rgba(255,255,255,0.8);
      animation: cardIn .6s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(.96); }
      to   { opacity: 1; transform: translateY(0)    scale(1);   }
    }

    /* ── Header ── */
    .card-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .lumi-wrap {
      display: inline-block;
      animation: lumiFloat 2.4s ease-in-out infinite alternate;
      margin-bottom: 10px;
      cursor: default;
    }
    @keyframes lumiFloat {
      from { transform: translateY(0); }
      to   { transform: translateY(-7px); }
    }
    .logo-text {
      font-family: 'Bubblegum Sans', cursive;
      font-size: 32px;
      color: var(--ink);
      line-height: 1;
    }
    .logo-text em { color: var(--s-dark); font-style: normal; }
    .logo-sub {
      font-size: 13px; color: var(--muted);
      margin-top: 5px; font-weight: 700;
      font-style: italic;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: 14px;
      padding: 4px;
      gap: 4px;
      margin-bottom: 24px;
      border: 1.5px solid var(--border);
    }
    .tab {
      flex: 1; padding: 8px;
      border: none; border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800; font-size: 13px;
      cursor: pointer; transition: all .22s;
      background: transparent; color: var(--muted);
    }
    .tab.active {
      background: white; color: var(--ink);
      box-shadow: 0 2px 8px rgba(61,53,48,0.10);
    }

    /* ── Form ── */
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block; font-size: 11.5px; font-weight: 800;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 6px;
    }
    .form-input {
      width: 100%; padding: 11px 14px;
      border: 2px solid var(--border); border-radius: 13px;
      background: white; font-family: 'Nunito', sans-serif;
      font-size: 13.5px; font-weight: 700; color: var(--ink);
      outline: none; transition: all .22s;
    }
    .form-input:focus {
      border-color: var(--s-pri);
      box-shadow: 0 0 0 4px var(--s-light);
    }
    .form-input::placeholder { color: var(--muted); font-weight: 600; }

    .form-input.error { border-color: #f4a4b8; box-shadow: 0 0 0 4px var(--c-light); }

    /* ── Password toggle ── */
    .pw-wrap { position: relative; }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; font-size: 16px;
      color: var(--muted); padding: 4px;
      transition: color .2s;
    }
    .pw-toggle:hover { color: var(--ink); }

    /* ── Forgot link ── */
    .forgot {
      display: block; text-align: right;
      font-size: 11.5px; font-weight: 700;
      color: var(--muted); text-decoration: none;
      margin-top: -6px; margin-bottom: 18px;
      transition: color .2s;
    }
    .forgot:hover { color: var(--s-dark); }

    /* ── Submit button ── */
    .btn-submit {
      width: 100%; padding: 12px;
      border: none; border-radius: 14px;
      font-family: 'Nunito', sans-serif;
      font-weight: 900; font-size: 14.5px;
      cursor: pointer; transition: all .25s;
      background: linear-gradient(135deg, var(--s-pri), #5bb88a);
      color: white;
      box-shadow: 0 4px 16px rgba(61,53,48,0.15);
      display: flex; align-items: center;
      justify-content: center; gap: 8px;
      position: relative; overflow: hidden;
    }
    .btn-submit::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(rgba(255,255,255,0), rgba(255,255,255,0.12));
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(61,53,48,0.2); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 18px 0; color: var(--muted);
      font-size: 11.5px; font-weight: 700;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1.5px; background: var(--border);
    }

    /* ── Social buttons ── */
    .social-row { display: flex; gap: 10px; }
    .btn-social {
      flex: 1; padding: 10px 8px;
      border: 2px solid var(--border); border-radius: 12px;
      background: white; font-family: 'Nunito', sans-serif;
      font-weight: 800; font-size: 12px; cursor: pointer;
      transition: all .2s; color: var(--ink);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-social:hover { background: var(--bg); border-color: var(--subtle); transform: translateY(-1px); }

    /* ── Error message ── */
    .err-msg {
      background: var(--c-light); border: 1.5px solid var(--c-dark);
      border-radius: 10px; padding: 9px 13px;
      font-size: 12px; font-weight: 700; color: var(--c-dark);
      margin-bottom: 14px; display: none;
    }
    .err-msg.vis { display: block; animation: shake .4s ease; }
    @keyframes shake {
      0%,100%{ transform:translateX(0); }
      20%{ transform:translateX(-5px); }
      40%{ transform:translateX(5px); }
      60%{ transform:translateX(-3px); }
      80%{ transform:translateX(3px); }
    }

    /* ── Spinner ── */
    .spin-icon {
      display: inline-block; width: 16px; height: 16px;
      border: 2.5px solid rgba(255,255,255,.35);
      border-top-color: white; border-radius: 50%;
      animation: spinning .7s linear infinite;
    }
    @keyframes spinning { to { transform: rotate(360deg); } }

    /* ── Footer note ── */
    .card-footer {
      text-align: center; margin-top: 20px;
      font-size: 11.5px; color: var(--muted); font-weight: 700;
    }
    .card-footer a { color: var(--s-dark); text-decoration: none; }
    .card-footer a:hover { text-decoration: underline; }

    /* ── Signup extra fields (hidden initially) ── */
    #signup-form { display: none; }
    #login-form  { display: block; }

    /* ── Success state ── */
    .success-screen {
      display: none; text-align: center; padding: 10px 0;
    }
    .success-screen.vis { display: block; animation: cardIn .5s ease both; }
    .success-title {
      font-family: 'Bubblegum Sans', cursive;
      font-size: 22px; color: var(--ink); margin: 14px 0 8px;
    }
    .success-sub { font-size: 13px; color: var(--muted); font-weight: 700; margin-bottom: 22px; }
    .btn-continue {
      width: 100%; padding: 12px;
      border: none; border-radius: 14px;
      font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 14px;
      cursor: pointer; background: linear-gradient(135deg, var(--s-pri), #5bb88a);
      color: white; box-shadow: 0 4px 16px rgba(61,53,48,.15);
      transition: all .2s;
    }
    .btn-continue:hover { transform: translateY(-2px); }
  </style>
</head>
<body>

  <!-- Background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Floating petals -->
  <div class="petal" style="left:5%;animation-duration:22s;animation-delay:0s">🌸</div>
  <div class="petal" style="left:18%;animation-duration:28s;animation-delay:6s;font-size:14px">✿</div>
  <div class="petal" style="left:70%;animation-duration:19s;animation-delay:3s">🌸</div>
  <div class="petal" style="left:85%;animation-duration:25s;animation-delay:10s;font-size:13px">✾</div>
  <div class="petal" style="left:50%;animation-duration:32s;animation-delay:8s;font-size:20px">🌺</div>

  <!-- Card -->
  <div class="card">

    <!-- Header -->
    <div class="card-header">
      <div class="lumi-wrap">
        <svg width="70" height="70" viewBox="0 0 48 48">
          <ellipse cx="24" cy="29" rx="15" ry="13" fill="#fde8c0" stroke="#f4c87a" stroke-width="1.5"/>
          <circle  cx="24" cy="18" r="12.5" fill="#fde8c0" stroke="#f4c87a" stroke-width="1.5"/>
          <ellipse cx="13" cy="24" rx="4" ry="3" fill="#f4a4b8" opacity=".5"/>
          <ellipse cx="35" cy="24" rx="4" ry="3" fill="#f4a4b8" opacity=".5"/>
          <ellipse cx="10" cy="14" rx="3.5" ry="5" fill="#fde8c0" stroke="#f4c87a" stroke-width="1.5"/>
          <ellipse cx="38" cy="14" rx="3.5" ry="5" fill="#fde8c0" stroke="#f4c87a" stroke-width="1.5"/>
          <ellipse cx="10" cy="14" rx="1.8" ry="3.2" fill="#f9c5d0"/>
          <ellipse cx="38" cy="14" rx="1.8" ry="3.2" fill="#f9c5d0"/>
          <!-- happy face -->
          <circle cx="18" cy="22" r="2.5" fill="#3d3530"/>
          <circle cx="30" cy="22" r="2.5" fill="#3d3530"/>
          <path d="M15 28 Q24 35 33 28" stroke="#3d3530" stroke-width="2" fill="none" stroke-linecap="round"/>
          <!-- sprout -->
          <path d="M24 5 Q26 1 30 3" stroke="#6dc49a" stroke-width="2" fill="none" stroke-linecap="round"/>
          <circle cx="30" cy="3" r="2.5" fill="#6dc49a"/>
        </svg>
      </div>
      <div class="logo-text">🌱 <em>Sprout</em></div>
      <div class="logo-sub">grow your ideas beautifully ✦</div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tab-login"  onclick="switchTab('login')">Sign In</button>
      <button class="tab"        id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Error message -->
    <div class="err-msg" id="err-msg">🌸 Oops! Please check your details and try again.</div>

    <!-- LOGIN FORM -->
    <div id="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="login-email" placeholder="hello@sprout.app"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="pw-wrap">
          <input class="form-input" type="password" id="login-pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
          <button class="pw-toggle" onclick="togglePw('login-pw',this)" tabindex="-1">👁</button>
        </div>
      </div>
      <a href="#" class="forgot">Forgot password?</a>
      <button class="btn-submit" id="login-btn" onclick="doLogin()">
        🌿 Sign In to Sprout
      </button>

      <div class="divider">or continue with</div>
      <div class="social-row">
        <button class="btn-social" onclick="socialLogin('Google')">
          <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button class="btn-social" onclick="socialLogin('Apple')">
          <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#3d3530" d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Apple
        </button>
      </div>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signup-form">
      <div class="form-group">
        <label class="form-label">Your Name</label>
        <input class="form-input" type="text" id="signup-name" placeholder="e.g. Mia 🌸"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="signup-email" placeholder="hello@sprout.app"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="pw-wrap">
          <input class="form-input" type="password" id="signup-pw" placeholder="Create a password" onkeydown="if(event.key==='Enter')doSignup()"/>
          <button class="pw-toggle" onclick="togglePw('signup-pw',this)" tabindex="-1">👁</button>
        </div>
      </div>
      <button class="btn-submit" id="signup-btn" onclick="doSignup()">
        🌱 Create My Account
      </button>

      <div class="divider">or continue with</div>
      <div class="social-row">
        <button class="btn-social" onclick="socialLogin('Google')">
          <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button class="btn-social" onclick="socialLogin('Apple')">
          <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#3d3530" d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Apple
        </button>
      </div>
    </div>

    <!-- Success state (shown after login/signup) -->
    <div class="success-screen" id="success-screen">
      <svg width="72" height="72" viewBox="0 0 48 48" style="margin:0 auto">
        <circle cx="24" cy="24" r="22" fill="#e6f7ef" stroke="#6dc49a" stroke-width="2"/>
        <path d="M14 24 L21 31 L34 17" stroke="#3a7a5c" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="success-title" id="success-title">Welcome back! 🌸</div>
      <div class="success-sub" id="success-sub">Lumi is so excited to see you again!</div>
      <button class="btn-continue" onclick="goToModeSelect()">
        Choose Your Mode →
      </button>
    </div>

    <div class="card-footer" id="card-footer">
      <span id="footer-text">Don't have an account? <a href="#" onclick="switchTab('signup')">Sign up free</a></span>
    </div>
  </div>

  <script>
    let currentTab = 'login';

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('login-form').style.display  = tab==='login'  ? 'block' : 'none';
      document.getElementById('signup-form').style.display = tab==='signup' ? 'block' : 'none';
      document.getElementById('tab-login').className  = 'tab' + (tab==='login'  ? ' active' : '');
      document.getElementById('tab-signup').className = 'tab' + (tab==='signup' ? ' active' : '');
      document.getElementById('footer-text').innerHTML = tab==='login'
        ? `Don't have an account? <a href="#" onclick="switchTab('signup')">Sign up free</a>`
        : `Already have an account? <a href="#" onclick="switchTab('login')">Sign in</a>`;
      hideErr();
    }

    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      btn.textContent = show ? '🙈' : '👁';
    }

    function showErr(msg) {
      const el = document.getElementById('err-msg');
      el.textContent = msg;
      el.classList.add('vis');
    }
    function hideErr() { document.getElementById('err-msg').classList.remove('vis'); }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = `<span class="spin-icon"></span> Just a sec…`;
      } else {
        btn.disabled = false;
        btn.innerHTML = btnId==='login-btn' ? '🌿 Sign In to Sprout' : '🌱 Create My Account';
      }
    }

    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const pw    = document.getElementById('login-pw').value;
      hideErr();
      if (!email || !pw)           { showErr('🌸 Please fill in all fields!'); return; }
      if (!email.includes('@'))    { showErr('🌸 That doesn\'t look like a valid email.'); return; }

      setLoading('login-btn', true);
      try {
        const res  = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pw })
        });
        const data = await res.json();
        if (data.success) {
          showSuccess('Welcome back! 🌸', `Good to see you, ${data.user.name}!`);
        } else {
          showErr('🌸 Wrong email or password — try again!');
          setLoading('login-btn', false);
        }
      } catch {
        showErr('🌐 Could not reach the server. Is app.py running?');
        setLoading('login-btn', false);
      }
    }

    async function doSignup() {
      const name  = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const pw    = document.getElementById('signup-pw').value;
      hideErr();
      if (!name || !email || !pw) { showErr('🌸 Please fill in all fields!'); return; }
      if (!email.includes('@'))   { showErr('🌸 That doesn\'t look like a valid email.'); return; }
      if (pw.length < 6)          { showErr('🌸 Password must be at least 6 characters.'); return; }

      setLoading('signup-btn', true);
      try {
        const res  = await fetch('/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password: pw })
        });
        const data = await res.json();
        if (data.success) {
          showSuccess(`Hey ${data.user.name}! 🌱`, 'Your garden is ready. Let\'s pick a mode!');
        } else {
          showErr('🌸 Something went wrong — try again!');
          setLoading('signup-btn', false);
        }
      } catch {
        showErr('🌐 Could not reach the server. Is app.py running?');
        setLoading('signup-btn', false);
      }
    }

    function socialLogin(provider) {
      // Placeholder — wire up real OAuth here
      showErr(`🌸 ${provider} login coming soon!`);
    }

    function showSuccess(title, sub) {
      document.getElementById('login-form').style.display  = 'none';
      document.getElementById('signup-form').style.display = 'none';
      document.querySelector('.tabs').style.display = 'none';
      document.getElementById('err-msg').style.display = 'none';
      document.getElementById('card-footer').style.display = 'none';
      document.getElementById('success-title').textContent = title;
      document.getElementById('success-sub').textContent   = sub;
      document.getElementById('success-screen').classList.add('vis');
    }

    function goToModeSelect() {
      window.location.href = '/mode-select';
    }
  </script>
</body>
</html>
